<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>成績記録ツール — GLN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<style>
:root{--navy:#0c2340;--blue:#0b4f8a;--accent:#1a7fd4;--gold:#c89a2e;--bg:#f4f7fb;--surface:#ffffff;--border:#dce8f4;--text:#1a2535;--muted:#5c6e82;--radius:12px;--shadow:0 2px 12px rgba(11,79,138,.09);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',"Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:80px;}
header{background:var(--navy);padding:24px 20px;color:#fff;}
header h1{font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:400;}
header h1 em{font-style:italic;color:#a8cef0;}
.portal-label{font-size:0.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;}
.tab-nav{background:var(--navy);display:flex;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.tab-btn{padding:12px 18px;font-size:0.85rem;color:#8db5d8;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold);}
main{max-width:960px;margin:20px auto;padding:0 16px;}
.tab-panel{display:none;animation:fadeIn 0.3s;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-title{font-family:'DM Serif Display',serif;font-size:1rem;}
.card-body{padding:18px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:15px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:0.75rem;font-weight:700;color:var(--accent);}
.form-input,.form-select{padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:0.9rem;}
.subject-row{display:flex;gap:5px;}
.btn-primary{flex:1;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;}
.btn-gold{background:var(--gold);}
.btn-secondary{padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:0.8rem;cursor:pointer;}
.table-responsive{overflow-x:auto;}
.data-table{width:100%;border-collapse:collapse;font-size:0.8rem;}
.data-table th{text-align:left;padding:10px;border-bottom:2px solid var(--border);color:var(--muted);}
.data-table td{padding:10px;border-bottom:1px solid #eee;}
.score-pct{font-weight:700;padding:2px 6px;border-radius:4px;background:#e8f5e9;color:#2e7d32;}
.ocr-area{display:block;border:2px dashed var(--accent);border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#f8fbff;margin-bottom:15px;}
.ocr-preview{max-width:100%;max-height:200px;display:none;margin:10px auto;border-radius:5px;}
.ocr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:1000;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.stats-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid var(--border);}
.stat-val{font-size:1.2rem;font-weight:700;color:var(--navy);}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;opacity:0;transition:0.3s;z-index:2000;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="portal-label">Global Lingua Network</div>
  <h1>成績記録 <em>Dashboard</em></h1>
</header>
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('teiki')">定期テスト <span id="badge-teiki">0</span></button>
  <button class="tab-btn" onclick="switchTab('moshi')">模試 <span id="badge-moshi">0</span></button>
</nav>
<main>
  <div id="panel-teiki" class="tab-panel active">
    <div class="card">
      <div class="card-header"><div class="card-title">データ入力 / OCR撮影</div></div>
      <div class="card-body">
        <label class="ocr-area">
          <input type="file" accept="image/*" capture="environment" onchange="runOcr(event,'teiki')" hidden>
          <div>📷 成績表を撮影して自動入力</div>
          <img id="preview-teiki" class="ocr-preview">
        </label>
        <div id="bulk-ui-teiki" style="display:none;background:#fffde7;padding:10px;border-radius:8px;margin-bottom:15px;">
          <div class="table-responsive"><table class="data-table" id="bulk-table-teiki"></table></div>
          <div style="display:flex;gap:10px;margin-top:10px;"><button class="btn-primary" onclick="submitBulk('teiki')">一括登録</button><button class="btn-secondary" onclick="cancelBulk('teiki')">破棄</button></div>
        </div>
        <input type="hidden" id="edit-id-teiki">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">試験名</label><input type="text" id="name-teiki" class="form-input" placeholder="1学期中間"></div>
          <div class="form-group"><label class="form-label">日付</label><input type="date" id="date-teiki" class="form-input"></div>
          <div class="form-group"><label class="form-label">科目</label><div class="subject-row"><select id="sel-subj-teiki" class="form-select" onchange="syncSubj('teiki')"></select><button class="btn-secondary" onclick="toggleSubj('teiki')">手入力</button></div><input type="text" id="cust-subj-teiki" class="form-input" style="display:none;margin-top:5px;"></div>
          <div class="form-group"><label class="form-label">点数 / 満点</label><div style="display:flex;align-items:center;gap:5px;"><input type="number" id="score-teiki" class="form-input" style="width:70px;"><input type="number" id="max-teiki" class="form-input" value="100" style="width:70px;"></div></div>
        </div>
        <div style="display:flex;gap:10px;"><button id="btn-teiki" class="btn-primary btn-gold" onclick="addRec('teiki')">＋ 記録を追加</button><button class="btn-secondary" onclick="clearAll('teiki')">クリア</button></div>
      </div>
    </div>
    <div id="stats-teiki" class="stats-strip"></div>
    <div class="card" id="card-chart-teiki" style="display:none;"><div class="card-body"><canvas id="chart-teiki" height="250"></canvas></div></div>
    <div class="card"><div class="table-responsive" id="table-teiki"></div></div>
  </div>

  <div id="panel-moshi" class="tab-panel">
    <!-- 模試用（定期テストと同様の構造） -->
    <div class="card">
      <div class="card-header"><div class="card-title">模試データ入力</div></div>
      <div class="card-body">
        <label class="ocr-area"><input type="file" accept="image/*" capture="environment" onchange="runOcr(event,'moshi')" hidden>📷 模試成績表を撮影</label>
        <div id="bulk-ui-moshi" style="display:none;background:#fffde7;padding:10px;border-radius:8px;margin-bottom:15px;"><table class="data-table" id="bulk-table-moshi"></table><button class="btn-primary" onclick="submitBulk('moshi')">一括登録</button></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">模試名</label><input type="text" id="name-moshi" class="form-input"></div>
          <div class="form-group"><label class="form-label">日付</label><input type="date" id="date-moshi" class="form-input"></div>
          <div class="form-group"><label class="form-label">科目</label><div class="subject-row"><select id="sel-subj-moshi" class="form-select" onchange="syncSubj('moshi')"></select></div></div>
          <div class="form-group"><label class="form-label">点数/偏差値</label><div style="display:flex;gap:5px;"><input type="number" id="score-moshi" class="form-input" placeholder="点"><input type="number" id="hen-moshi" class="form-input" step="0.1" placeholder="偏差値"></div></div>
        </div>
        <button id="btn-moshi" class="btn-primary btn-gold" onclick="addRec('moshi')">＋ 模試を記録</button>
      </div>
    </div>
    <div id="stats-moshi" class="stats-strip"></div>
    <div class="card" id="card-chart-moshi" style="display:none;"><div class="card-body"><canvas id="chart-moshi" height="250"></canvas></div></div>
    <div class="card"><div class="table-responsive" id="table-moshi"></div></div>
  </div>
</main>

<div id="ocr-loading" class="ocr-overlay"><div class="spinner"></div><p style="margin-top:15px;">文字を解析中...</p></div>
<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let DATA = { teiki: [], moshi: [] };
let CHARTS = {};
let BULK_TEMP = { teiki: [], moshi: [] };
const SUBJ_MASTER = ["国語","数学I","数学A","数学II","数学B","英語","物理","化学","生物","日本史","世界史","地理","公共"];

window.onload = () => {
  const saved = localStorage.getItem('gln_v2');
  if(saved) DATA = JSON.parse(saved);
  initSels();
  refresh('teiki'); refresh('moshi');
  $('date-teiki').value = $('date-moshi').value = new Date().toISOString().split('T')[0];
};

function initSels() {
  ['teiki','moshi'].forEach(t => {
    let h = '<option value="">選択してください</option>';
    SUBJ_MASTER.forEach(s => h += `<option value="${s}">${s}</option>`);
    $(`sel-subj-${t}`).innerHTML = h + '<option value="other">その他(手入力)</option>';
  });
}

function switchTab(t) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $(`panel-${t}`).classList.add('active');
  event.currentTarget.classList.add('active');
}

function toast(m) {
  const s = $('toast'); s.textContent = m; s.classList.add('show');
  setTimeout(() => s.classList.remove('show'), 2000);
}

function refresh(t) {
  localStorage.setItem('gln_v2', JSON.stringify(DATA));
  $(`badge-${t}`).textContent = DATA[t].length;
  renderStats(t);
  renderTable(t);
  renderChart(t);
}

function syncSubj(t) {
  const s = $(`sel-subj-${t}`), c = $(`cust-subj-${t}`);
  if(s.value === 'other') { c.style.display = 'block'; c.focus(); }
  else { c.style.display = 'none'; c.value = s.value; }
}

function toggleSubj(t) {
  const s = $(`sel-subj-${t}`), c = $(`cust-subj-${t}`);
  const isHidden = s.style.display === 'none';
  s.style.display = isHidden ? 'block' : 'none';
  c.style.display = isHidden ? 'none' : 'block';
}

function addRec(t) {
  const name = $(`name-${t}`).value, date = $(`date-${t}`).value;
  const subj = $(`sel-subj-${t}`).value === 'other' ? $(`cust-subj-${t}`).value : $(`sel-subj-${t}`).value;
  const score = parseFloat($(`score-${t}`).value);
  if(!name || !subj || isNaN(score)) return alert('試験名、科目、点数を入力してください');

  const id = $(`edit-id-${t}`).value;
  const rec = { id: id ? Number(id) : Date.now(), name, date, subject: subj, score, max: parseFloat($(`max-${t}`).value)||100 };
  if(t==='moshi') rec.hen = parseFloat($(`hen-moshi`).value);

  if(id) DATA[t] = DATA[t].map(r => r.id === rec.id ? rec : r);
  else DATA[t].push(rec);

  refresh(t); clearAll(t); toast('保存しました');
}

function renderTable(t) {
  let h = `<table class="data-table"><thead><tr><th>日付</th><th>科目</th><th>点数</th><th>操作</th></tr></thead><tbody>`;
  DATA[t].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
    h += `<tr><td>${r.date.slice(5)}</td><td>${r.subject}</td><td>${r.score}<small>/${r.max}</small></td>
    <td><button class="btn-secondary" onclick="editRec('${t}',${r.id})">改</button><button class="btn-secondary" onclick="delRec('${t}',${r.id})">×</button></td></tr>`;
  });
  $(`table-${t}`).innerHTML = h + '</tbody></table>';
}

function editRec(t, id) {
  const r = DATA[t].find(x => x.id === id);
  $(`edit-id-${t}`).value = r.id; $(`name-${t}`).value = r.name; $(`date-${t}`).value = r.date;
  $(`score-${t}`).value = r.score; $(`max-${t}`).value = r.max;
  $(`sel-subj-${t}`).value = SUBJ_MASTER.includes(r.subject) ? r.subject : 'other';
  if($(`sel-subj-${t}`).value === 'other') { $(`cust-subj-${t}`).value = r.subject; $(`cust-subj-${t}`).style.display='block'; }
  $(`btn-${t}`).textContent = '✓ 更新する';
}

function delRec(t, id) { if(confirm('消去しますか？')){ DATA[t]=DATA[t].filter(x=>x.id!==id); refresh(t); } }

function clearAll(t) {
  $(`edit-id-${t}`).value = ''; $(`score-${t}`).value = ''; $(`btn-${t}`).textContent = '＋ 記録を追加';
}

function renderStats(t) {
  if(!DATA[t].length) { $(`stats-${t}`).innerHTML = ''; return; }
  const avg = DATA[t].reduce((p,c)=>p+(c.score/c.max*100),0) / DATA[t].length;
  $(`stats-${t}`).innerHTML = `<div class="stat-card"><div class="stat-val">${DATA[t].length}</div>件</div><div class="stat-card"><div class="stat-val">${Math.round(avg)}%</div>平均</div>`;
}

function renderChart(t) {
  if(!DATA[t].length) return;
  $(`card-chart-${t}`).style.display = 'block';
  if(CHARTS[t]) CHARTS[t].destroy();
  const sorted = [...DATA[t]].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const subjs = [...new Set(sorted.map(r=>r.subject))];
  const dates = [...new Set(sorted.map(r=>r.date))];
  
  CHARTS[t] = new Chart($(`chart-${t}`), {
    type:'line',
    data: {
      labels: dates.map(d => d.slice(5)),
      datasets: subjs.map((s,i) => ({
        label: s,
        data: dates.map(d => {
          const match = sorted.find(r=>r.subject===s && r.date===d);
          return match ? (match.score/match.max*100) : null;
        }),
        borderColor: `hsl(${i*40},70%,50%)`, tension: 0.3, spanGaps: true
      }))
    },
    options: { responsive: true, scales: { y: { min:0, max:100 } } }
  });
}

async function runOcr(ev, t) {
  const file = ev.target.files[0]; if(!file) return;
  $('ocr-loading').style.display = 'flex';
  const worker = await Tesseract.createWorker('jpn');
  const { data: { text } } = await worker.recognize(file);
  await worker.terminate();
  $('ocr-loading').style.display = 'none';
  
  const results = [];
  const lines = text.split('\n');
  lines.forEach(l => {
    SUBJ_MASTER.forEach(s => {
      if(l.includes(s)) {
        const m = l.match(/(\d{1,3})/);
        if(m) results.push({ subject: s, score: Number(m[1]), name: "OCR読取", date: new Date().toISOString().split('T')[0] });
      }
    });
  });

  if(results.length > 1) showBulk(results, t);
  else if(results.length === 1) { 
    $(`sel-subj-${t}`).value = results[0].subject; $(`score-${t}`).value = results[0].score;
    toast('読み込みました');
  } else toast('文字を認識できませんでした');
}

function showBulk(list, t) {
  BULK_TEMP[t] = list;
  let h = '<tr><th>科</th><th>点</th></tr>';
  list.forEach((r,i) => h += `<tr><td>${r.subject}</td><td><input type="number" value="${r.score}" id="bk-sc-${t}-${i}" style="width:50px"></td></tr>`);
  $(`bulk-table-${t}`).innerHTML = h;
  $(`bulk-ui-${t}`).style.display = 'block';
}

function submitBulk(t) {
  BULK_TEMP[t].forEach((r,i) => {
    r.score = Number($(`bk-sc-${t}-${i}`).value);
    DATA[t].push({...r, id: Date.now()+i, max: 100});
  });
  cancelBulk(t); refresh(t); toast('一括登録完了');
}

function cancelBulk(t) { $(`bulk-ui-${t}`).style.display = 'none'; BULK_TEMP[t] = []; }
</script>
</body>
</html>
